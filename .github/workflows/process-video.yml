name: Process Video Job

on:
  repository_dispatch:
    types: [new_video_job]

jobs:
  ffmpeg-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Đã bỏ bước Install tools vì Runner có sẵn hết rồi

      - name: Download input files
        run: |
          set -e
          echo "⬇ Download main video..."
          # Thêm --retry 3 để chống lag mạng
          curl -L --fail --retry 3 -o input.mp4 "${{ secrets.MY_DOWNLOAD_URL }}?id=${{ github.event.client_payload.video_url }}&raw=1"

          if [ ! -s input.mp4 ]; then
            echo "❌ input.mp4 lỗi hoặc rỗng"
            exit 1
          fi

          INTRO_URL="${{ github.event.client_payload.intro_url }}"
          if [ ! -z "$INTRO_URL" ] && [ "$INTRO_URL" != "0" ]; then
            echo "⬇ Download intro..."
            curl -L --fail --retry 3 -o intro.mp4 "${{ secrets.MY_INTRO_URL }}?id=$INTRO_URL"
            [ ! -s intro.mp4 ] && rm -f intro.mp4 || echo "✅ Intro OK"
          fi

          AUDIO_URL="${{ github.event.client_payload.audio_url }}"
          if [ ! -z "$AUDIO_URL" ] && [ "$AUDIO_URL" != "0" ]; then
            echo "⬇ Download audio..."
            curl -L --fail --retry 3 -o audio.mp3 "$AUDIO_URL"
            [ ! -s audio.mp3 ] && rm -f audio.mp3 || echo "✅ Audio OK"
          fi

      - name: Process video
        run: |
          set -e
          chmod +x process_dynamic.sh

          INTRO_FILE=""
          [ -s intro.mp4 ] && INTRO_FILE="intro.mp4"

          AUDIO_FILE=""
          [ -s audio.mp3 ] && AUDIO_FILE="audio.mp3"

          ./process_dynamic.sh \
            input.mp4 \
            "$INTRO_FILE" \
            "${{ github.event.client_payload.flip }}" \
            "$AUDIO_FILE" \
            output_final.mp4

          if [ ! -s output_final.mp4 ]; then
            echo "❌ FFmpeg không tạo được file output"
            exit 1
          fi

      - name: Upload & callback
        run: |
          set -e
          echo "⬆ Uploading..."
          # -f để curl trả về lỗi nếu upload thất bại
          response=$(curl -f -s -w "%{http_code}" -o upload_response.json \
            -F "file=@output_final.mp4" \
            "${{ secrets.UPLOAD_URL }}")

          code=$(echo "$response" | tail -c 3)

          if [ "$code" != "200" ]; then
            echo "❌ Upload failed ($code)"
            cat upload_response.json
            exit 1
          fi

          output_url=$(jq -r '.output_url // empty' upload_response.json)

          if [ -z "$output_url" ] || [ "$output_url" = "null" ]; then
            echo "❌ Không lấy được output_url từ response"
            exit 1
          fi

          echo "::add-mask::$output_url"
          echo "✅ Upload OK: $output_url"

          echo "📡 Callback..."
          # Tạo JSON an toàn bằng jq
          CALLBACK_DATA=$(jq -n \
            --arg id "${{ github.event.client_payload.job_id }}" \
            --arg url "$output_url" \
            '{job_id: $id, output_url: $url}')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$CALLBACK_DATA" \
            "${{ secrets.CALLBACK_URL }}"
